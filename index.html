<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>今日のおみくじ ✨</title>
<style>
  :root{
    --pink:#ff8fd8;
    --purple:#a78bfa;
    --blue:#7dd3fc;
    --gold:#ffd76e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{
    height:-webkit-fill-available;
  }
  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    min-height:100dvh;
    font-family:"Segoe UI","Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,143,216,.25), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(125,211,252,.25), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(167,139,250,.3), transparent 50%),
      linear-gradient(160deg,#0b0620 0%, #1a0f3d 45%, #2a1150 100%);
    background-attachment:fixed;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
    touch-action:manipulation;
    -webkit-text-size-adjust:100%;
  }
  body{
    min-height:100vh;
    min-height:-webkit-fill-available;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }
  @media (min-height:700px){
    html,body{ align-items:center; }
  }

  #stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }
  .star{
    position:absolute;
    background:#fff;
    border-radius:50%;
    animation:twinkle ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.15; transform:scale(.8);}
    50%{opacity:1; transform:scale(1.3);}
  }

  .container{
    position:relative;
    z-index:1;
    width:100%;
    max-width:480px;
    padding:24px 18px 36px;
    text-align:center;
  }

  h1{
    font-size:clamp(1.5rem, 6vw, 1.9rem);
    margin:0 0 6px;
    background:linear-gradient(90deg, var(--pink), var(--gold), var(--blue), var(--purple));
    background-size:300% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shimmer 4s linear infinite;
    letter-spacing:.08em;
  }
  @keyframes shimmer{
    to{background-position:300% center;}
  }

  .date{
    color:#c9b8f5;
    font-size:.85rem;
    margin-bottom:20px;
    letter-spacing:.05em;
  }

  .box{
    position:relative;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
    border-radius:24px;
    padding:32px 20px 26px;
    min-height:260px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border:1px solid rgba(255,255,255,.18);
    box-shadow:
      0 8px 40px rgba(120,60,200,.35),
      inset 0 0 40px rgba(255,255,255,.05);
    overflow:hidden;
  }
  .box::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:24px;
    padding:2px;
    background:linear-gradient(120deg, var(--pink), var(--gold), var(--blue), var(--purple), var(--pink));
    background-size:300% 300%;
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    animation:borderMove 6s linear infinite;
    opacity:.8;
  }
  @keyframes borderMove{
    to{background-position:300% 300%;}
  }

  #placeholder{
    color:#e5d9ff;
    font-size:1.1rem;
    opacity:.9;
    line-height:1.8;
    position:relative;
    z-index:1;
  }
  #placeholder .glow-icon{
    display:block;
    font-size:2.4rem;
    margin-bottom:10px;
    filter:drop-shadow(0 0 10px rgba(255,215,110,.8));
  }

  .result{
    display:none;
    position:relative;
    z-index:1;
  }
  .result.show{
    display:block;
    animation:fadeUp .6s ease;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(14px) scale(.95);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }

  .rank{
    font-size:clamp(2.6rem, 12vw, 3.4rem);
    font-weight:900;
    letter-spacing:.1em;
    margin:0 0 14px;
    background:linear-gradient(90deg, var(--gold), #fff6d8, var(--gold));
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shimmer 3s linear infinite;
    filter:drop-shadow(0 0 18px rgba(255,215,110,.6));
  }
  .rank.凶{
    background:linear-gradient(90deg, #cbd5e1, #fff, #cbd5e1);
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    filter:drop-shadow(0 0 14px rgba(200,200,220,.5));
  }

  .advice{
    color:#fdf6ff;
    font-size:clamp(.95rem, 4vw, 1.05rem);
    line-height:1.8;
    padding:12px 6px;
    border-top:1px dashed rgba(255,255,255,.25);
    border-bottom:1px dashed rgba(255,255,255,.25);
  }

  .chara{
    display:block;
    margin:16px auto 0;
    width:118px;
    height:auto;
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
    opacity:0;
    animation:charaPop .55s cubic-bezier(.34,1.56,.64,1) .25s forwards;
  }
  @keyframes charaPop{
    0%{opacity:0; transform:translateY(10px) scale(.6);}
    100%{opacity:1; transform:translateY(0) scale(1);}
  }

  button{
    margin-top:24px;
    font-size:1.05rem;
    font-weight:bold;
    letter-spacing:.08em;
    color:#2a0a3d;
    background:linear-gradient(120deg, var(--gold), #fff2c4, var(--pink));
    background-size:200% auto;
    border:none;
    border-radius:50px;
    padding:16px 40px;
    min-height:52px;
    cursor:pointer;
    box-shadow:0 6px 22px rgba(255,143,216,.35), 0 6px 22px rgba(125,211,252,.2);
    transition:transform .15s ease, box-shadow .15s ease, background-position .3s ease;
    position:relative;
    z-index:1;
    -webkit-user-select:none;
    user-select:none;
    touch-action:manipulation;
  }
  button:hover{
    background-position:100% center;
    box-shadow:0 8px 28px rgba(255,215,110,.5);
  }
  button:active{
    transform:scale(.96);
  }

  .shuffle{
    animation:shake .5s ease;
  }
  @keyframes shake{
    0%,100%{transform:rotate(0deg);}
    20%{transform:rotate(-3deg);}
    40%{transform:rotate(3deg);}
    60%{transform:rotate(-2deg);}
    80%{transform:rotate(2deg);}
  }

  .share-area{
    margin-top:20px;
    display:none;
    flex-direction:column;
    align-items:center;
    gap:10px;
    position:relative;
    z-index:1;
  }
  .share-area.show{
    display:flex;
  }
  .share-btn{
    margin-top:0;
    padding:12px 28px;
    min-height:46px;
    font-size:.9rem;
    background:rgba(255,255,255,.9);
    color:#4b2a80;
  }
  .copied{
    color:var(--gold);
    font-size:.85rem;
    height:1.2em;
    opacity:0;
    transition:opacity .3s ease;
  }
  .copied.show{opacity:1;}

  footer{
    margin-top:24px;
    color:rgba(201,184,245,.6);
    font-size:.75rem;
    position:relative;
    z-index:1;
  }

  .sparkle-burst{
    position:fixed;
    left:0;
    top:0;
    width:10px;
    height:10px;
    pointer-events:none;
    font-size:1.2rem;
    z-index:5;
    animation:burst 1s ease-out forwards;
  }
  @keyframes burst{
    0%{
      opacity:1;
      transform:translate(var(--sx), var(--sy)) scale(.6) rotate(0deg);
    }
    100%{
      opacity:0;
      transform:translate(var(--ex), var(--ey)) scale(1.4) rotate(180deg);
    }
  }
</style>
</head>
<body>
<div id="stars"></div>

<div class="container">
  <h1>✨ 今日のおみくじ ✨</h1>
  <div class="date" id="today"></div>

  <div class="box">
    <div id="placeholder">
      <span class="glow-icon">🔮</span>
      ボタンを押して<br>今日の運勢を占おう
    </div>
    <div class="result" id="result">
      <div class="rank" id="rank"></div>
      <div class="advice" id="advice"></div>
      <img class="chara" id="charaImg" src="" alt="のりえ">
    </div>
  </div>

  <button id="drawBtn">✨ おみくじを引く ✨</button>

  <div class="share-area" id="shareArea">
    <button class="share-btn" id="shareBtn">💌 結果をシェアする</button>
    <div class="copied" id="copiedMsg">コピーしました！友達に貼り付けて送ってね</div>
  </div>

  <footer>1日1回、気分転換にどうぞ 🌙</footer>
</div>

<script>
  // 背景の星をランダム生成
  const starsContainer = document.getElementById("stars");
  const STAR_COUNT = 70;
  for(let i=0;i<STAR_COUNT;i++){
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*2 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    s.style.animationDuration = (Math.random()*3 + 2) + "s";
    s.style.animationDelay = (Math.random()*3) + "s";
    starsContainer.appendChild(s);
  }

  const ranks = [
    { name: "大吉", weight: 10 },
    { name: "中吉", weight: 20 },
    { name: "小吉", weight: 25 },
    { name: "末吉", weight: 25 },
    { name: "凶",   weight: 20 }
  ];

  const advices = {
    "大吉": [
      "今日は思い切って行動すると、驚くほどうまくいく日。",
      "小さなチャンスも見逃さずキャッチして。",
      "人との出会いが幸運を運んでくる予感。",
      "自信を持って一歩踏み出そう。",
      "頑張ってきたことが認められるとき。"
    ],
    "中吉": [
      "焦らずマイペースが吉。着実に前進を。",
      "誰かへの感謝を言葉にすると運気アップ。",
      "新しいことを少しだけ試してみて。",
      "整理整頓をすると気持ちもスッキリ。",
      "笑顔でいると良いことが寄ってくる日。"
    ],
    "小吉": [
      "無理せず、いつも通りが一番。",
      "小さな幸せに気づけると運気アップ。",
      "休憩を挟むと調子が整う一日。",
      "身近な人との会話にヒントあり。",
      "水分補給を忘れずに、体調第一で。"
    ],
    "末吉": [
      "今は種まきの時期。焦らずじっくりと。",
      "後半にかけて運気が上向く兆し。",
      "困ったときは誰かに相談してみて。",
      "予定は詰め込みすぎず余裕を持って。",
      "小さな片付けが後の運を呼び込む。"
    ],
    "凶": [
      "無理は禁物、今日はゆっくり休もう。",
      "大事な決断は明日以降に持ち越して。",
      "忘れ物やミスに気をつけて過ごそう。",
      "焦らずいつもより慎重に行動を。",
      "早めの休息が明日への近道。"
    ]
  };

  function pickRank(){
    const total = ranks.reduce((s,r)=>s+r.weight,0);
    let rand = Math.random() * total;
    for(const r of ranks){
      if(rand < r.weight) return r.name;
      rand -= r.weight;
    }
    return ranks[ranks.length-1].name;
  }

  function pickAdvice(rankName){
    const list = advices[rankName];
    return list[Math.floor(Math.random()*list.length)];
  }

  const todayEl = document.getElementById("today");
  const now = new Date();
  todayEl.textContent = now.getFullYear() + "年" + (now.getMonth()+1) + "月" + now.getDate() + "日";

  const drawBtn = document.getElementById("drawBtn");
  const placeholder = document.getElementById("placeholder");
  const resultEl = document.getElementById("result");
  const rankEl = document.getElementById("rank");
  const adviceEl = document.getElementById("advice");
  const shareArea = document.getElementById("shareArea");
  const shareBtn = document.getElementById("shareBtn");
  const copiedMsg = document.getElementById("copiedMsg");
  const box = document.querySelector(".box");
  const charaImg = document.getElementById("charaImg");
  const CHARA_DATA = JSON.parse(document.getElementById("chara-data").textContent);
  const RANK_TO_CHARA = {
    "大吉": "daikichi",
    "中吉": "chuukichi",
    "小吉": "shoukichi",
    "末吉": "suekichi",
    "凶": "kyo"
  };

  let currentRank = "";
  let currentAdvice = "";

  const SPARKLE_EMOJI = ["✨","🌟","💫","⭐","💖","🎉"];

  let audioCtx = null;
  function playChime(){
    try{
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === "suspended"){
        audioCtx.resume();
      }
      const now = audioCtx.currentTime;
      // シャラーン:低めで柔らかいベル音、余韻長め
      const notes = [261.63, 329.63, 392.00, 523.25];
      const filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 1500;
      filter.connect(audioCtx.destination);
      notes.forEach((freq, i) => {
        const t = now + i * 0.14;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.1, t + 0.09);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.1);
        osc.connect(gain);
        gain.connect(filter);
        osc.start(t);
        osc.stop(t + 1.15);
      });
    }catch(e){
      // Web Audio未対応環境では無音でスキップ
    }
  }

  function spawnSparkles(originX, originY){
    const count = 28;
    for(let i=0;i<count;i++){
      const el = document.createElement("div");
      el.className = "sparkle-burst";
      el.textContent = SPARKLE_EMOJI[Math.floor(Math.random()*SPARKLE_EMOJI.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist = 80 + Math.random()*160;
      const ex = Math.cos(angle) * dist;
      const ey = Math.sin(angle) * dist;
      el.style.setProperty("--sx", originX + "px");
      el.style.setProperty("--sy", originY + "px");
      el.style.setProperty("--ex", (originX+ex) + "px");
      el.style.setProperty("--ey", (originY+ey) + "px");
      el.style.animationDelay = (Math.random()*0.15) + "s";
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 1200);
    }
  }

  drawBtn.addEventListener("click", (e) => {
    box.classList.remove("shuffle");
    void box.offsetWidth;
    box.classList.add("shuffle");

    playChime();

    currentRank = pickRank();
    currentAdvice = pickAdvice(currentRank);

    placeholder.style.display = "none";
    resultEl.classList.remove("show");
    void resultEl.offsetWidth;

    rankEl.textContent = currentRank;
    rankEl.className = "rank " + currentRank;
    adviceEl.textContent = currentAdvice;
    charaImg.src = CHARA_DATA[RANK_TO_CHARA[currentRank]];

    resultEl.classList.add("show");
    shareArea.classList.add("show");
    copiedMsg.classList.remove("show");

    drawBtn.textContent = "✨ もう一度引く ✨";

    const rect = box.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width/2, rect.top + rect.height/2);
  });

  shareBtn.addEventListener("click", async () => {
    const text = "✨今日のおみくじ✨\n運勢：" + currentRank + "\n「" + currentAdvice + "」\n\nあなたも今日の運勢を占ってみて！";

    if(navigator.share){
      try{
        await navigator.share({ text });
        return;
      }catch(e){
        // ユーザーがキャンセルした場合などはコピーにフォールバック
      }
    }

    try{
      await navigator.clipboard.writeText(text);
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    copiedMsg.classList.add("show");
    setTimeout(()=>copiedMsg.classList.remove("show"), 2500);
  });
</script>
</body>
</html>
